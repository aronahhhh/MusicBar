name: Lyrics matching issue
description: Report missing, wrong, or unsynced lyrics.
title: "[Lyrics]: "
labels: ["lyrics"]
body:
  - type: input
    id: title
    attributes:
      label: Song title
    validations:
      required: true
  - type: input
    id: artist
    attributes:
      label: Artist
    validations:
      required: true
  - type: input
    id: album
    attributes:
      label: Album
  - type: dropdown
    id: problem
    attributes:
      label: Problem type
      options:
        - No lyrics found
        - Wrong lyrics matched
        - Lyrics are not synced
        - Chinese lyrics missing
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Include the music app and a screenshot if possible.
