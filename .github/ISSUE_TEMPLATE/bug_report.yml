name: Bug report
description: Report something that is broken in MusicBar.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open MusicBar
        2. Play a song in Apple Music
        3. ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 14.5
    validations:
      required: true
  - type: dropdown
    id: player
    attributes:
      label: Music app
      options:
        - Apple Music
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Screenshots, screen recordings, lyrics examples, or logs help.
