name: Feature request
description: Suggest an improvement or new player integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would make MusicBar better?
    validations:
      required: true
  - type: input
    id: player
    attributes:
      label: Music app or service
      placeholder: Apple Music, Spotify, NetEase Cloud Music, QQ Music, etc.
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Screenshots, references, or similar apps are useful.
