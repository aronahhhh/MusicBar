<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">MusicBar preview</title>
  <desc id="desc">A preview mockup of MusicBar showing a macOS menu bar item, playback controls, and lyrics window.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111318"/>
      <stop offset="1" stop-color="#242834"/>
    </linearGradient>
    <linearGradient id="art" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17a2a8"/>
      <stop offset="1" stop-color="#e13f62"/>
    </linearGradient>
    <linearGradient id="lyrics" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07080b"/>
